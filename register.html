<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QueueFlow - Organization Registration</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
</head>
<body>

<header class="navbar">
<div class="logo"><i class="fa-solid fa-layer-group"></i><span>QueueFlow</span></div>
<nav>
<a href="index.html">Home</a>
<a href="admin.html">Admin</a>
<a href="analytics.html">Analytics</a>
</nav>
</header>

<section class="hero">
<h1>Register Organization</h1>
<p>Create a new tenant with its own admin account, default queue, and default counter.</p>
</section>

<section class="admin-container">
<div class="card">
<h2>Organization Details</h2>
<form id="registerForm" class="form-grid">
<input class="input" id="businessName" placeholder="Business Name" required>
<input class="input" id="businessType" placeholder="Business Type" required>
<input class="input" id="ownerName" placeholder="Owner Name" required>
<input class="input" id="email" type="email" placeholder="Email" required>
<input class="input" id="phone" placeholder="Phone" required>
<input class="input" id="password" type="password" placeholder="Password" required>
<button class="btn btn-primary" type="submit">Create Organization</button>
</form>
<p id="registerState" class="state state-empty" role="status" aria-live="polite">Fill in the form to create a new organization.</p>
</div>
</section>

<script src="js/api.js"></script>
<script src="js/register.js"></script>
</body>
</html>
